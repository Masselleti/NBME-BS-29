    <meta charset="UTF-8">
    <script>
    /* === Ephemeral session + persistent highlights (added by request) ===
       HIGHLIGHTS PERSIST PERMANENTLY across sessions: keys prefixed "ma_hl_"
       (the highlighter's stem/commentary/option highlight HTML) are written to
       real localStorage and survive closing the tab/window.
       ALL OTHER viewer state (flags, crossed-out choices / strikeouts, selected
       answers, notes, timer, theme) stays session-only via sessionStorage and is
       discarded on close. Non-highlight data saved by earlier sessions is purged
       on load. To revert to fully-ephemeral, restore the old localStorage->session
       redirect. Must run before embedded-assets.js and every app script. */
    (function () {
      var realLS = null, ss = null;
      try { realLS = window.localStorage; } catch (e) {}
      try { ss = window.sessionStorage; } catch (e) {}
      function isHL(k) { return typeof k === 'string' && k.indexOf('ma_hl_') === 0; }
      /* Purge prior-session NON-highlight data from persistent storage; keep highlights. */
      try {
        var rm = [];
        for (var i = 0; i < realLS.length; i++) { var k = realLS.key(i); if (k && !isHL(k)) rm.push(k); }
        for (var j = 0; j < rm.length; j++) realLS.removeItem(rm[j]);
      } catch (e) {}
      /* Hybrid: ma_hl_* -> persistent localStorage; everything else -> ephemeral sessionStorage. */
      var hybrid = {
        getItem: function (k) { try { return isHL(k) ? realLS.getItem(k) : ss.getItem(k); } catch (e) { return null; } },
        setItem: function (k, v) { try { if (isHL(k)) realLS.setItem(k, v); else ss.setItem(k, v); } catch (e) {} },
        removeItem: function (k) { try { if (isHL(k)) realLS.removeItem(k); else ss.removeItem(k); } catch (e) {} },
        clear: function () { try { ss.clear(); } catch (e) {} },
        key: function (i) { try { return ss.key(i); } catch (e) { return null; } },
        get length() { try { return ss.length; } catch (e) { return 0; } }
      };
      try {
        Object.defineProperty(window, 'localStorage', {
          configurable: true,
          get: function () { return hybrid; }
        });
      } catch (e) {}
    })();
    </script>

    <script>
        // Splash failsafe — closes splash regardless of JS errors below
        (function () {
            function hideSplash() {
                var s = document.getElementById('ma-splash-overlay');
                if (!s) return;
                s.classList.add('ma-splash-hide');
                setTimeout(function () { if (s && s.parentNode) s.parentNode.removeChild(s); }, 600);
            }
            // Primary: fires as soon as DOM is ready
            document.addEventListener('DOMContentLoaded', function () { setTimeout(hideSplash, 2000); });
            // Fallback: if DOMContentLoaded already fired or page takes too long
            window.addEventListener('load', function () { setTimeout(hideSplash, 500); });
        })();

            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .progress-tooltip {
            position: absolute;
            bottom: 18px;
            background: var(--text-strong);
            color: var(--card);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            pointer-events: none;
            display: none;
            white-space: nowrap;
            z-index: 10;
            font-weight: 700;
            transform: translateX(-50%);
            box-shadow: var(--elev-2);
        }

        .progress-tooltip.show {
            display: block;
        }

        .question-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 40px;
            margin-bottom: 24px;
            box-shadow: var(--elev-1);
        }


        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 14px;
        }

        .question-number {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 0.02em;
        }

        .timer {
            background: var(--surface);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', monospace;
            font-weight: 700;
            border: 1px solid var(--border);
            color: var(--text-strong);
            transition: all 0.3s;
            margin-left: auto;
            letter-spacing: 0.04em;
        }

        .timer.warning {
            color: var(--warning);
            border-color: var(--warning);
            background: rgba(217, 119, 6, 0.08);
        }

        .timer.critical {
            color: var(--danger);
            border-color: var(--danger);
            background: rgba(197, 48, 48, 0.08);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.55;
            }
        }

        .question-stem,
        .option-text,
        .commentary-content {
            font-size: calc(16px * var(--text-scale)) !important;
            line-height: calc(1.8 * var(--text-scale)) !important;
            color: var(--text-strong) !important;
            transition: font-size 0.2s, line-height 0.2s;
        }

        .question-stem {
            margin-bottom: 32px;
            user-select: text;
            text-align: justify;
            font-weight: 400;
        }

        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .answer-option {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 14px;
            cursor: pointer;
            margin-bottom: 0 !important;
        }

        .answer-option:active:not(.disabled) {
            transform: scale(0.995);
        }

        .learning-mode .answer-option:hover:not(.selected):not(.disabled):not(.eliminated):not(.correct):not(.incorrect),
        .exam-mode .answer-option:hover:not(.disabled):not(.selected):not(.eliminated) {
            border-color: var(--primary);
            background: var(--hover-bg);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .answer-option.selected {
            border-color: var(--primary);
            background: var(--selected-bg);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .answer-option.correct {
            border-color: var(--success);
            background: rgba(43, 179, 150, 0.07);
            box-shadow: 0 0 0 2px rgba(43, 179, 150, 0.2);
        }

        .answer-option.incorrect {
            border-color: var(--danger);
            background: rgba(197, 48, 48, 0.07);
            box-shadow: 0 0 0 2px rgba(197, 48, 48, 0.2);
        }

        .answer-option.disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .answer-option.eliminated {
            opacity: 0.38 !important;
            filter: grayscale(100%);
            background: transparent !important;
            border-color: var(--border) !important;
            box-shadow: none !important;
        }

        .answer-option.eliminated .option-text,
        .answer-option.eliminated .option-text * {
            text-decoration: line-through !important;
            color: var(--muted) !important;
        }

        .answer-option.eliminated .option-letter {
            text-decoration: line-through !important;
            background: var(--border) !important;
            color: var(--muted) !important;
            border-color: var(--border) !important;
        }

        .answer-option .option-letter {
            background: var(--bg-alt);
            color: var(--muted);
            width: 30px;
            min-width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 12px;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
        }

        .answer-option.selected .option-letter {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .answer-option.correct .option-letter {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }

        .answer-option.incorrect .option-letter {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .answer-option .option-content {
            flex: 1;
        }

        .answer-option .option-text {
            margin: 0;
            user-select: text;
            font-weight: 400;
            pointer-events: none;
        }

        .answer-option .option-text * {
            background: transparent !important;
        }

        .commentary {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            display: none;
            border: 1px solid var(--border);
            border-top: 3px solid var(--primary);
            box-shadow: var(--elev-1);
        }

        .commentary.show {
            display: block;
            animation: fadeIn 0.4s;
        }

        .commentary h4 {
            color: var(--primary);
            margin-bottom: 18px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.1em;
        }

        .commentary-content {
            user-select: text;
            text-align: justify;
            font-weight: 400;
            line-height: 1.75;
        }

        .commentary-content * {
            background: transparent !important;
        }

        /* Navigation */
        .navigation {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(245, 243, 239, 0.92);
            backdrop-filter: blur(16px) saturate(1.4);
            -webkit-backdrop-filter: blur(16px) saturate(1.4);
            padding: 14px 44px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 900;
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.06);
            margin-top: 0;
            transition: transform 0.4s ease, opacity 0.4s ease;
            flex-wrap: wrap;
            gap: 10px;
        }

        html.dark .navigation {
            background: rgba(14, 17, 23, 0.92);
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.5);
        }

        .navigation button {
            padding: 11px 22px;
            font-size: 13px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            background: var(--card);
            color: var(--text-strong);
            font-weight: 700;
            transition: all 0.2s;
            font-family: inherit;
            outline: none;
            margin: 0;
            flex: 1;
            min-width: 100px;
            text-align: center;
        }

        @media (min-width: 768px) {
            .navigation button {
                flex: none;
            }
        }

        .navigation button:hover:not(:disabled) {
            background: var(--hover-bg);
            border-color: var(--primary);
            color: var(--primary);
        }

        .navigation button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .navigation .primary-btn {
            background: linear-gradient(135deg, var(--primary), #c07c2c) !important;
            color: #fff !important;
            border-color: transparent !important;
            padding: 11px 28px;
            box-shadow: 0 4px 12px rgba(212, 147, 63, 0.3);
        }

        .navigation .primary-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary-hover), #a86a20) !important;
            box-shadow: 0 6px 18px rgba(212, 147, 63, 0.4) !important;
            transform: translateY(-1px);
        }

        .navigation .center-btn {
            position: static;
            background: transparent;
            border: 1.5px dashed var(--border);
            color: var(--muted);
            font-size: 12px;
        }

        @media (min-width: 768px) {
            .navigation .center-btn {
                position: absolute;
                left: 50%;
                transform: translateX(-50%);
            }
        }

        /* PRO UX TOOLS */
        #btn-suspend {
            background: transparent !important;
            border: 1.5px dashed var(--warning) !important;
            color: var(--warning) !important;
            order: -1;
            margin-right: auto;
        }

        #btn-suspend:hover {
            background: var(--warning) !important;
            color: #fff !important;
            border-style: solid !important;
        }

        .q-tools-bar {
            display: flex;
            gap: 8px;
            margin-left: auto;
            align-items: center;
        }

        .q-tool-btn {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 5px 11px;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .q-tool-btn:hover {
            background: var(--hover-bg);
            color: var(--text-strong);
            border-color: var(--border-strong);
        }

        .q-tool-btn.active-flag {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }

        .q-tool-btn.active-note {
            background: rgba(217, 119, 6, 0.08);
            border-color: var(--warning);
            color: var(--warning);
        }

        .ma-note-textarea {
            width: 100%;
            height: 250px;
            padding: 20px;
            border: none;
            background: transparent;
            color: var(--text-strong);
            font-family: inherit;
            font-size: 16px;
            resize: vertical;
            outline: none;
            line-height: 1.7;
        }

        .ma-note-textarea:focus {
            background: var(--hover-bg);
            border-radius: 12px;
        }

        /* MCC HINT BUTTON STYLING */
        .btn-hint-sexy {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff !important;
            border: none;
            padding: 10px 22px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(212, 147, 63, 0.35);
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px 0;
            font-family: inherit;
            letter-spacing: 0.02em;
        }

        .btn-hint-sexy:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(212, 147, 63, 0.5);
        }

        /* MCC HINT MODAL STYLING */
        .ma-modal-overlay#hint-modal {
            z-index: 999999;
        }

        #hint-modal .ma-modal-card {
            max-width: 640px;
            border: 1px solid rgba(212, 147, 63, 0.3);
            box-shadow: 0 0 40px rgba(212, 147, 63, 0.12), var(--elev-3);
            background: linear-gradient(to bottom, var(--card), var(--surface));
        }

        #hint-modal .ma-modal-header {
            background: rgba(212, 147, 63, 0.07);
            border-bottom: 1px solid rgba(212, 147, 63, 0.15);
        }

        #hint-modal .ma-modal-header h3 {
            color: var(--primary);
            font-weight: 700;
            font-size: 17px;
        }

        #hint-modal-body {
            font-size: 1.02em;
            line-height: 1.75;
            padding: 24px;
        }

        /* Lab Floating Button */
        .fab-lab {
            position: fixed;
            right: 28px;
            bottom: 100px;
            z-index: 9900;
            background: linear-gradient(135deg, var(--primary), #c07c2c);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(212, 147, 63, 0.4), var(--elev-2);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
        }

        .fab-lab:hover {
            transform: scale(1.12) rotate(-8deg);
            box-shadow: 0 10px 28px rgba(212, 147, 63, 0.55);
        }

        /* HIGHLIGHTER */
        #highlight-palette {
            position: absolute;
            display: none;
            padding: 8px 12px;
            background: var(--card);
            border-radius: 99px;
            box-shadow: var(--elev-2), 0 0 0 1px var(--border);
            z-index: 999999;
            align-items: center;
            gap: 8px;
            animation: hl-pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes hl-pop {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(10px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        #highlight-palette .hp-color {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
        }

        #highlight-palette .hp-color:hover {
            transform: scale(1.35);
            border-color: var(--text-strong);
            z-index: 2;
        }

        \1 #ffe36f;
        }

        \1 #8adf8a;
        }

        \1 #7cb5ff;
        }

        \1color: var(--muted);

            display: flex;
            align-items: center;
            height: 22px;
            user-select: none;
        }

        #highlight-palette .hp-remove:hover {
            color: var(--accent);
        }

        .hl-yellow {
            background-color: #fff6a7;\1color: #1f2937;
        }

        .hl-green {
            background-color: #c8f7c5;\1color: #1f2937;
        }

        .hl-blue {
            background-color: #cfe9ff;\1color: #1f2937;
        }

        html.dark .hl-yellow {
            background-color: rgba(250, 204, 21, 0.35);
            color: #fff;
        }

        html.dark .hl-green {
            background-color: rgba(74, 222, 128, 0.35);
            color: #fff;
        }

        html.dark .hl-blue {
            background-color: rgba(56, 189, 248, 0.35);
            color: #fff;
        }

        /* ZEN MODE */
        body.zen-mode .topbar,
        body.zen-mode .navigation {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        body.zen-mode .navigation {
            transform: translateY(100%);
        }

        body.zen-mode .content {
            padding-top: 20px;
            padding-bottom: 40px;
            max-width: 1000px;
        }

        body.zen-mode .question-card {
            box-shadow: none;
            border-color: transparent;
            background: transparent;
            padding: 0;
        }

        #btn-zen-exit {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            z-index: 999999;
            background: var(--danger);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 11px 24px;
            border-radius: 99px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            box-shadow: 0 8px 22px rgba(157, 22, 18, 0.4);
            transition: transform 0.4s ease;
            opacity: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        body.zen-mode #btn-zen-exit {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* MODALS */
        .ma-modal-overlay,
        .modal,
        .time-up-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 20, 0.75);
            backdrop-filter: blur(10px) saturate(1.2);
            -webkit-backdrop-filter: blur(10px);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.25s ease;
            padding: 20px;
        }

        .ma-modal-overlay.show,
        .modal.show,
        .time-up-modal.show {
            display: flex;
            opacity: 1;
        }

        .ma-modal-card,
        .modal-content,
        .time-up-content {
            background: var(--card);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            border-radius: 24px;
            box-shadow: var(--elev-3), 0 0 0 1px var(--border);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transform: translateY(22px) scale(0.98);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .ma-modal-overlay.show .ma-modal-card,
        .modal.show .modal-content,
        .time-up-modal.show .time-up-content {
            transform: translateY(0) scale(1);
        }

        .ma-modal-header {
            padding: 22px 26px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 24px 24px 0 0;
            flex-shrink: 0;
        }

        .ma-modal-header h3 {
            margin: 0;
            font-size: 17px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-strong);
            font-weight: 700;
        }

        .ma-modal-close,
        .modal-close {
            background: var(--bg-alt);
            border: 1px solid var(--border);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 18px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 2;
        }

        .ma-modal-close:hover,
        .modal-close:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .ma-modal-body {
            padding: 24px;
            overflow-y: auto;
            color: var(--text-strong);
            border-radius: 0 0 24px 24px;
        }

        .modal-content {
            max-width: 90%;
            align-items: center;
            background: transparent;
            box-shadow: none;
            border: none;
            overflow: hidden;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 14px;
            background: var(--card);
            padding: 8px;
            box-shadow: var(--elev-3);
            object-fit: contain;
        }

        .time-up-content {
            padding: 48px;
            text-align: center;
            max-width: 440px;
            border: 1px solid var(--danger);
        }

        .time-up-content h2 {
            color: var(--danger);
            font-family: var(--font-display);
            font-size: 2em;
            margin-bottom: 14px;
            font-weight: 700;
        }

        .time-up-content p {
            font-size: 15px;
            margin-bottom: 28px;
            color: var(--muted);
        }

        .time-up-content button {
            background: linear-gradient(135deg, var(--primary), #c07c2c);
            color: #fff;
            padding: 15px 28px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(212, 147, 63, 0.3);
        }

        .time-up-content button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(212, 147, 63, 0.45);
        }

        /* Support Modal */
        .custom-modal {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            transform: translateY(110%);
            background: var(--card);
            padding: 28px 24px;
            text-align: center;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.15);
            border-radius: 20px 20px 0 0;
            z-index: 99999;
            border-top: 1px solid var(--border);
        }

        .custom-modal.active {
            transform: translateY(0);
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--primary);
        }

        .modal-item {
            background: var(--hover-bg);
            padding: 13px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .modal-item span {
            color: var(--primary);
            font-weight: 700;
        }

        .close-btn {
            margin-top: 16px;
            background: linear-gradient(135deg, var(--primary), #c07c2c);
            color: #fff;
            padding: 13px;
            width: 100%;
            border-radius: 10px;
            font-size: 15px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(212, 147, 63, 0.3);
        }

        .close-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(212, 147, 63, 0.4);
        }

        .question-container img,
        .explanation-container img,
        #question-review-container img,
        img.option-image {
            max-width: 100% !important;
            height: auto !important;
            display: block;
            margin: 20px auto;
            border-radius: 12px;
            object-fit: contain;
            cursor: pointer;
            box-shadow: var(--elev-1);
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        img.option-image:hover {
            transform: scale(1.02);
            box-shadow: var(--elev-2);
            border-color: var(--primary);
        }

        .question-stem video,
        .commentary-content video,
        .option-text video,
        .question-stem audio,
        .commentary-content audio,
        .option-text audio {
            max-width: 100% !important;
            border-radius: 8px;
            margin: 15px 0;
            box-shadow: var(--elev-1);
            display: block;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-inline {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--muted);
            margin: 4px 0 8px 16px;
        }

        .spinner-small {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* EXAM RESULTS */
        .exam-results {
            padding: 30px 0;
        }

        .results-header {
            background:
                radial-gradient(ellipse at 10% 50%, rgba(212, 147, 63, 0.25) 0%, transparent 60%),
                linear-gradient(135deg, #1c1208 0%, #0e0a12 100%);
            color: #fff !important;
            padding: 50px 44px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 24px;
            box-shadow: var(--elev-3);
            position: relative;
            overflow: hidden;
        }

        .results-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--grain);
            opacity: 0.4;
            pointer-events: none;
        }

        .results-header h2 {
            font-family: var(--font-display);
            font-size: 1.8em;
            margin-bottom: 14px;
            color: rgba(255, 255, 255, 0.8) !important;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        .results-header .score {
            font-size: 4.5em;
            font-weight: 800;
            margin: 12px 0;
            color: var(--primary) !important;
            line-height: 1;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 40px rgba(212, 147, 63, 0.4);
        }

        .results-header .percentage {
            font-size: 1.4em;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.65) !important;
            position: relative;
            z-index: 1;
        }

        .results-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin: 28px 0 40px 0;
        }

        .results-chart-card,
        .results-stats-card {
            background: var(--card);
            border-radius: 20px;
            padding: 28px;
            box-shadow: var(--elev-1);
            border: 1px solid var(--border);
        }

        .results-chart-card h3,
        .results-stats-card h3 {
            margin-bottom: 20px;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.1em;
            font-weight: 800;
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
        }

        .question-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 24px;
        }

        .question-item {
            padding: 12px 0;
            border-radius: 10px;
            text-align: center;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid transparent;
        }

        .question-item.correct {
            background: rgba(43, 179, 150, 0.09);
            color: var(--success);
            border-color: rgba(43, 179, 150, 0.25);
        }

        .question-item.incorrect {
            background: rgba(197, 48, 48, 0.09);
            color: var(--danger);
            border-color: rgba(197, 48, 48, 0.25);
        }

        .question-item.unanswered {
            background: var(--bg-alt);
            color: var(--muted);
            border-color: var(--border);
        }

        /* Motivational Message Cards */
        .results-message-card {
            margin: 16px 0 20px;
            border-radius: 14px;
            padding: 16px 18px;
            box-shadow: var(--elev-1);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: center;
        }

        .results-message-title {
            font-size: 0.85em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .results-message-body {
            font-size: 0.9em;
            line-height: 1.7;
            color: var(--muted);
        }

        .results-message-low {
            border-color: rgba(197, 48, 48, 0.3);
            background: rgba(197, 48, 48, 0.04);
        }

        .results-message-low .results-message-title {
            color: var(--danger);
        }

        .results-message-medium {
            border-color: rgba(217, 119, 6, 0.3);
            background: rgba(217, 119, 6, 0.04);
        }

        .results-message-medium .results-message-title {
            color: var(--warning);
        }

        .results-message-high {
            border-color: rgba(43, 179, 150, 0.3);
            background: rgba(43, 179, 150, 0.04);
        }

        .results-message-high .results-message-title {
            color: var(--success);
        }

        /* Splash Screen */
        #ma-splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999999;
            display: none; /* startup splash removed */
            align-items: center;
            justify-content: center;
            background: #0c0e13;
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
            font-family: var(--font);
        }

        #ma-splash-overlay.ma-splash-hide {
            opacity: 0;
            pointer-events: none;
        }

        .ma-splash-box {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            padding: 52px 44px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            color: #fff;
        }

        .ma-splash-box img {
            width: 110px;
            height: auto;
            margin: 0 auto 24px;
            filter: drop-shadow(0 0 30px rgba(212, 147, 63, 0.5));
            animation: pulse 2s ease-in-out infinite;
        }

        .ma-splash-loading {
            width: 100%;
            height: 3px;
            border-radius: 99px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .ma-splash-loading::after {
            content: "";
            position: absolute;
            left: -40%;
            top: 0;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: ma-splash-slide 1.4s infinite ease-in-out;
            border-radius: 99px;
        }

        @keyframes ma-splash-slide {
            0% {
                left: -40%;
            }

            100% {
                left: 100%;
            }
        }

        .ma-footer {
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            padding: 20px;
            font-weight: 600;
            margin-top: auto;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
